    <title>自定义页脚内容</title>
    <style>
        /* 页脚整体容器 */
        .badge-footer {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            font-size: 14px;
            color: var(--primary);
        }

        /* 动物图片 水平居中 */
        .animal-img {
            display: flex;
            justify-content: center;
        }

        /* 徽章组：横向同一行展示 */
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            align-items: center;
            justify-content: center;
        }

        /* 文字信息行 水平居中 */
        .footer-info {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            font-size: 13px;
            color: var(--primary);
            line-height: 1.8;
        }

        /* 链接样式 */
        .footer-info a {
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .footer-info a:hover {
            color: #409eff;
        }

        /* 统计小图标 */
        .footer-info img {
            width: 16px;
            height: 16px;
            display: inline-block;
        }
    </style>
</head>

        if (typeof window.__footerVersion === 'undefined') {
            window.__footerVersion = "__THEME_VERSION__";
            window.__footerSvgIcon = `<svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;"><title>主题</title><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10a2.5 2.5 0 0 0 2.5-2.5c0-.61-.23-1.2-.64-1.67a.528.528 0 0 1-.13-.33c0-.28.22-.5.5-.5H16c3.31 0 6-2.69 6-6c0-4.96-4.49-9-10-9zm5.5 11c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5s1.5.67 1.5 1.5s-.67 1.5-1.5 1.5zm-3-4c-.83 0-1.5-.67-1.5-1.5S13.67 6 14.5 6s1.5.67 1.5 1.5S15.33 9 14.5 9zM5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S7.33 13 6.5 13S5 12.33 5 11.5zm6-4c0 .83-.67 1.5-1.5 1.5S8 8.33 8 7.5S8.67 6 9.5 6s1.5.67 1.5 1.5z" fill="currentColor"></path></svg>`;
            var versionEl = document.getElementById('versionText');
            if (versionEl) versionEl.innerHTML = window.__footerSvgIcon + ' Astro Firefly Theme @ ' + window.__footerVersion;
        }
    </script>

    <!-- ====================== 运行时间核心代码 ====================== -->
    <script is:inline>
        // 网站开始运行时间（请修改为你的网站上线时间）
        // 添加防护避免重复声明
        if (typeof window.__siteStartTime === 'undefined') {
            window.__siteStartTime = "2026-04-28 00:00:00";

        // 运行时间函数
        function startRuntime() {
            const runtimeEl = document.getElementById('runtime');
            if (!runtimeEl) return;

            function update() {
                const start = new Date(window.__siteStartTime).getTime();
                const now = Date.now();
                const diff = now - start;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                runtimeEl.innerHTML = `
                    ⌛小破站已运行
                    <span style="color:#FFA500">${days}</span>天
                    <span style="color:#1DBF97">${hours}</span>时
                    <span style="color:#8A2BE2">${minutes}</span>分
                    <span style="color:#007EC6">${seconds}</span>秒
                `;
            }

            update();
            setInterval(update, 1000);
        }

        // 启动运行时间
        startRuntime();
        } // 结束 if 防护
    </script>
